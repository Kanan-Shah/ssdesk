{% extends "base.html" %}
{% block title %}Login — SSDesk{% endblock %}
{% block content %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 80px);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: -32px;
  }
  .auth-box {
    width: 100%;
    max-width: 380px;
  }
  .auth-header { margin-bottom: 28px; }
  .auth-title {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  .auth-title span { color: var(--accent); }
  .auth-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .auth-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-muted);
  }
</style>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-title">SS<span>Desk</span></div>
      <div class="auth-sub">Support ticket management system</div>
    </div>

    <div class="card">
      <div class="form-label" style="margin-bottom:16px;font-size:13px;text-transform:none;letter-spacing:0;color:var(--text);font-family:var(--sans);font-weight:600;">Sign in to your account</div>

      {% if form.errors %}
      <div class="alert alert-error">Invalid username or password.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}" />

        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-control" type="text" name="username" autofocus placeholder="your username" />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" placeholder="••••••••" />
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;">
          Sign In
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="/signup/">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
