{% extends "base.html" %}
{% block title %}Sign Up — SSDesk{% endblock %}
{% block content %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 80px);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: -32px;
  }
  .auth-box { width: 100%; max-width: 380px; }
  .auth-title { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--text); }
  .auth-title span { color: var(--accent); }
  .auth-sub { font-size: 13px; color: var(--text-muted); margin-top: 6px; margin-bottom: 24px; }
  .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
</style>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-title">SS<span>Desk</span></div>
    <div class="auth-sub">Create your account</div>

    <div class="card">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-control" type="text" name="username" required placeholder="choose a username" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;">
          Create Account
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="/login/">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
