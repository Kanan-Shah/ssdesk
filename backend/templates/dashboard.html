{% extends "base.html" %}
{% block title %}Dashboard — SSDesk{% endblock %}
{% block content %}
<style>
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-card.total::after  { background: var(--accent); }
  .stat-card.open::after   { background: var(--green); }
  .stat-card.overdue::after { background: var(--red); }
  .stat-card.avg::after    { background: var(--yellow); }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .stat-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* CATEGORY BARS */
  .cat-bar-row { margin-bottom: 12px; }
  .cat-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .cat-bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .cat-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .cat-colors { BUG: '#3b82f6'; FEATURE: '#22c55e'; BILLING: '#f97316'; OTHER: '#6b7280'; }

  /* PRIORITY DIST */
  .priority-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .priority-row:last-child { border-bottom: none; }

  @media (max-width: 900px) {
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .charts-row { grid-template-columns: 1fr; }
  }
</style>

<div class="page-header">
  <div class="page-title">Dashboard</div>
  <span style="font-size:12px;color:var(--text-muted);font-family:var(--mono);" id="refresh-time"></span>
</div>

<!-- Stats -->
<div class="stat-grid">
  <div class="stat-card total">
    <div class="stat-label">Total Tickets</div>
    <div class="stat-value" id="stat-total">—</div>
    <div class="stat-sub">all time</div>
  </div>
  <div class="stat-card open">
    <div class="stat-label">Open Tickets</div>
    <div class="stat-value" id="stat-open" style="color:var(--green);">—</div>
    <div class="stat-sub">currently active</div>
  </div>
  <div class="stat-card overdue">
    <div class="stat-label">Overdue</div>
    <div class="stat-value" id="stat-overdue" style="color:var(--red);">—</div>
    <div class="stat-sub">past SLA deadline</div>
  </div>
  <div class="stat-card avg">
    <div class="stat-label">Avg Resolution</div>
    <div class="stat-value" id="stat-avg" style="color:var(--yellow);font-size:22px;padding-top:5px;">—</div>
    <div class="stat-sub">last 7 days</div>
  </div>
</div>

<!-- Charts row -->
<div class="charts-row">
  <!-- Category breakdown -->
  <div class="card">
    <div class="section-title">Tickets by Category</div>
    <div id="category-chart"></div>
  </div>

  <!-- Priority distribution -->
  <div class="card">
    <div class="section-title">Priority Distribution</div>
    <div id="priority-chart"></div>
  </div>
</div>

<!-- Recent tickets -->
<div class="card">
  <div class="section-title">Recent Open Tickets</div>
  <div id="recent-tickets"></div>
</div>

<script>
const CAT_COLORS  = { BUG: '#3b82f6', FEATURE: '#22c55e', BILLING: '#f97316', OTHER: '#6b7280' };
const PRIO_COLORS = { P0: '#ef4444', P1: '#f97316', P2: '#eab308', P3: '#22c55e' };

function formatDuration(td) {
  if (!td) return '—';
  // timedelta string like "1 day, 3:12:45" or "3:12:45"
  const str = td.toString();
  const dayMatch = str.match(/(\d+)\s+day/);
  const days = dayMatch ? parseInt(dayMatch[1]) : 0;
  const timePart = str.split(', ').pop();
  const parts = timePart.split(':');
  const hours = parseInt(parts[0]) + days * 24;
  const mins  = parseInt(parts[1]);
  if (hours >= 24) return `${Math.floor(hours/24)}d ${hours%24}h`;
  return `${hours}h ${mins}m`;
}

async function loadDashboard() {
  const res  = await fetch('/api/tickets/dashboard/');
  const data = await res.json();

  document.getElementById('stat-total').textContent   = data.total_tickets;
  document.getElementById('stat-open').textContent    = data.open_tickets;
  document.getElementById('stat-overdue').textContent = data.overdue_tickets;
  document.getElementById('stat-avg').textContent     = formatDuration(data.avg_resolution_time);
  document.getElementById('refresh-time').textContent = `Updated ${new Date().toLocaleTimeString('en-IN')}`;

  // Category chart
  const cats    = data.category_distribution || [];
  const maxCat  = Math.max(...cats.map(c => c.count), 1);
  const catEl   = document.getElementById('category-chart');

  if (!cats.length) {
    catEl.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">No data available.</div>';
  } else {
    catEl.innerHTML = cats.map(c => `
      <div class="cat-bar-row">
        <div class="cat-bar-label">
          <span>${c.category}</span>
          <span style="font-family:var(--mono);font-weight:600;">${c.count}</span>
        </div>
        <div class="cat-bar-track">
          <div class="cat-bar-fill" style="width:${Math.round(c.count/maxCat*100)}%;background:${CAT_COLORS[c.category]||'#6b7280'};"></div>
        </div>
      </div>
    `).join('');
  }

  // Priority distribution (get from all tickets)
  loadPriorityDist();
  loadRecentTickets();
}

async function loadPriorityDist() {
  const res  = await fetch('/api/tickets/');
  const data = await res.json();
  const el   = document.getElementById('priority-chart');

  const counts = { P0:0, P1:0, P2:0, P3:0 };
  data.forEach(t => { if (counts[t.priority] !== undefined) counts[t.priority]++; });
  const total = data.length || 1;
  const labels = { P0:'Critical', P1:'High', P2:'Medium', P3:'Low' };

  el.innerHTML = Object.entries(counts).map(([p, c]) => `
    <div class="priority-row">
      <span class="badge badge-${p.toLowerCase()}" style="min-width:32px;text-align:center;">${p}</span>
      <span style="flex:1;color:var(--text-dim);">${labels[p]}</span>
      <div style="width:120px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;">
        <div style="width:${Math.round(c/total*100)}%;height:100%;background:${PRIO_COLORS[p]};border-radius:3px;"></div>
      </div>
      <span style="font-family:var(--mono);font-size:12px;color:var(--text-muted);min-width:24px;text-align:right;">${c}</span>
    </div>
  `).join('');
}

async function loadRecentTickets() {
  const res  = await fetch('/api/tickets/?status=OPEN&sort=latest');
  const data = await res.json();
  const el   = document.getElementById('recent-tickets');

  if (!data.length) {
    el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px 0;">No open tickets. 🎉</div>';
    return;
  }

  el.innerHTML = `
    <table style="width:100%;border-collapse:collapse;">
      <thead>
        <tr>
          <th style="text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:6px 10px;border-bottom:1px solid var(--border);">Ticket</th>
          <th style="text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:6px 10px;border-bottom:1px solid var(--border);">Priority</th>
          <th style="text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:6px 10px;border-bottom:1px solid var(--border);">SLA</th>
        </tr>
      </thead>
      <tbody>
        ${data.slice(0,8).map(t => `
          <tr>
            <td style="padding:10px 10px;border-bottom:1px solid var(--border);">
              <a href="/${t.id}/" style="font-size:13px;font-weight:500;color:var(--text);">#${t.id} — ${escHtml(t.title)}</a>
            </td>
            <td style="padding:10px;border-bottom:1px solid var(--border);">
              <span class="badge badge-${t.priority.toLowerCase()}">${t.priority}</span>
            </td>
            <td style="padding:10px;border-bottom:1px solid var(--border);">${formatSLA(t.sla_deadline)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function formatSLA(sla) {
  const now = new Date();
  const dl  = new Date(sla);
  const ms  = dl - now;
  const h   = Math.floor(Math.abs(ms)/3600000);
  const m   = Math.floor((Math.abs(ms)%3600000)/60000);
  if (ms < 0) return `<span style="color:var(--red);font-family:var(--mono);font-size:12px;">▲ ${h}h ${m}m overdue</span>`;
  if (ms < 3*3600000) return `<span style="color:var(--yellow);font-family:var(--mono);font-size:12px;">⚡ ${h}h ${m}m</span>`;
  return `<span style="color:var(--green);font-family:var(--mono);font-size:12px;">${h}h ${m}m</span>`;
}

function escHtml(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

loadDashboard();
</script>
{% endblock %}
